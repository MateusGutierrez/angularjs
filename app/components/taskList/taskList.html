<div>
    <div class="section-header">
        <h2>Tarefas</h2>
        <p>Gerencie suas tarefas do dia</p>
    </div>

    <form name="taskForm" ng-submit="$ctrl.addTask()" novalidate class="task-form">
        <input type="text" ng-model="$ctrl.newTask" required ng-minlength="3" placeholder="Nova tarefa..." 
            ng-pattern="/\S/"
            ng-trim="true"
        >
        <button type="submit" class="btn btn-primary" ng-disabled="taskForm.$invalid" ng-minlength="3">Adicionar</button>
    </form>
    <span ng-show="taskForm.$submitted && taskForm.$invalid" class="validation-error">
        Mínimo 3 caracteres.
    </span>

    <div class="task-filters">
        <input type="text" ng-model="$ctrl.search" placeholder="Buscar tarefa...">
        <button class="btn btn-sm btn-secondary" ng-click="$ctrl.filter = {}">Todas</button>
        <button class="btn btn-sm btn-secondary" ng-click="$ctrl.filter = {done: false}">Pendentes</button>
        <button class="btn btn-sm btn-secondary" ng-click="$ctrl.filter = {done: true}">Feitas</button>
        <button class="btn btn-sm btn-secondary" ng-click="">Ordenar por A-Z ou Z-A</button>
        <button class="btn btn-sm btn-secondary" ng-click="">Ordenar por data de criação</button>
    </div>

    <div ng-repeat="task in $ctrl.tasks | filter:$ctrl.search | filter:$ctrl.filter | orderBy:'name' track by $index"
         ng-class="{'done': task.done}"
         class="task-item">

        <span ng-hide="task.editing" class="task-name">{{ task.name }}</span>
        <span ng-show="task.editing">
            <input type="text" ng-model="task.name">
        </span>
        <div class="task-date">
            <span>{{ task.createdAt | date: 'dd/MM/yyyy HH:mm'}}</span>
        </div>
        <div class="task-actions" ng-hide="task.editing">
            <button class="btn btn-sm btn-secondary" ng-click="$ctrl.toggleTask(task)">
                {{ task.done ? 'Desfazer' : 'Concluir' }}
            </button>
            <button class="btn btn-sm btn-secondary" ng-click="$ctrl.editTask(task)">Editar</button>
            <button class="btn btn-sm btn-danger" ng-click="$ctrl.removeTask($index)">Remover</button>
        </div>

        <div class="task-actions" ng-show="task.editing">
            <button class="btn btn-sm btn-primary" ng-click="$ctrl.saveTask(task)">Salvar</button>
            <button class="btn btn-sm btn-secondary" ng-click="$ctrl.restoreTask(task)">Cancelar</button>
        </div>
    </div>

    <div class="empty-state" ng-hide="$ctrl.tasks.length > 0">
        <p>Nenhuma tarefa ainda.</p>
    </div>
    
    <div class="task-stats" ng-show="$ctrl.stats.total > 0">
        <span>Total: {{ $ctrl.stats.total }}</span>
        <span>Feitas: {{ $ctrl.stats.done }}</span>
        <span>Pendentes: {{ $ctrl.stats.pending }}</span>
    </div>
</div>
