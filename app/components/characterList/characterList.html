<div>
    <div class="section-header">
        <h2>Personagens</h2>
        <p>Rick and Morty API</p>
    </div>

    <!-- Filtros -->
    <div class="search-bar">
        <input type="text" ng-model="$ctrl.filters.name" placeholder="Buscar por nome..."
               ng-keyup="$event.keyCode === 13 && $ctrl.search()">
        <select ng-model="$ctrl.filters.status">
            <option value="">Todos os status</option>
            <option value="alive">Vivo</option>
            <option value="dead">Morto</option>
            <option value="unknown">Desconhecido</option>
        </select>
        <button class="btn btn-primary" ng-click="$ctrl.search()">Buscar</button>
        <button class="btn btn-secondary" ng-click="$ctrl.clearFilters()">Limpar</button>
    </div>

    <!-- Loading -->
    <div class="loading-center" ng-show="$ctrl.loading">
        <div class="spinner spinner-lg"></div>
    </div>

    <!-- Erro -->
    <div class="error-state" ng-show="$ctrl.error && !$ctrl.loading">
        <p>{{ $ctrl.error }}</p>
        <button class="btn btn-secondary mt-sm" ng-click="$ctrl.loadCharacters()">Tentar novamente</button>
    </div>

    <!-- Grid de personagens -->
    <div class="character-grid" ng-hide="$ctrl.loading || $ctrl.error">
        <a class="character-card" ng-repeat="char in $ctrl.characters track by char.id"
           href="#!/characters/{{ char.id }}">
            <img ng-src="{{ char.image }}" alt="{{ char.name }}" img-fallback>
            <div class="card-body">
                <h3>{{ char.name | truncate:20 }}</h3>
                <span class="badge"
                      ng-class="{
                          'badge-alive': char.status === 'Alive',
                          'badge-dead': char.status === 'Dead',
                          'badge-unknown': char.status === 'unknown'
                      }">
                    {{ char.status | translateStatus }}
                </span>
            </div>
        </a>
    </div>

    <!-- Paginação -->
    <div class="pagination" ng-hide="$ctrl.loading || $ctrl.error || $ctrl.characters.length === 0">
        <button class="btn btn-secondary btn-sm"
                ng-click="$ctrl.goToPage($ctrl.pagination.currentPage - 1)"
                ng-disabled="$ctrl.pagination.currentPage <= 1">
            Anterior
        </button>
        <span class="page-info">
            Página {{ $ctrl.pagination.currentPage }} de {{ $ctrl.pagination.totalPages }}
        </span>
        <button class="btn btn-secondary btn-sm"
                ng-click="$ctrl.goToPage($ctrl.pagination.currentPage + 1)"
                ng-disabled="$ctrl.pagination.currentPage >= $ctrl.pagination.totalPages">
            Próxima
        </button>
    </div>
</div>
